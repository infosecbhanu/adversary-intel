title: C2 Framework JA3 TLS Client Fingerprint
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: |
  Detects outbound connections from hosts using JA3 TLS fingerprints
  associated with known C2 frameworks (Cobalt Strike beacon, Sliver, Metasploit).
  JA3 fingerprints the client-side TLS Client Hello — the specific cipher suites,
  TLS version, and extensions the malware uses to initiate a connection.
references:
  - https://github.com/salesforce/ja3
author: adversary-intel
date: 2026/01/01
tags:
  - attack.command-and-control
  - attack.t1071.001
  - attack.t1573.002
logsource:
  category: network_connection
detection:
  selection_cs:
    ja3_hash:
      - "51c64c77e60f3980eea90869b68c58a8"  # Cobalt Strike default beacon JA3
      - "72a589da586844d7f0818ce684948eea"  # Cobalt Strike alternate
  selection_metasploit:
    ja3_hash:
      - "a0e9f5d64349fb13191bc781f81f42e1"  # Metasploit Meterpreter
  selection_sliver:
    ja3_hash:
      - "839bbe3ed07fed922ded5aaf714d6842"  # Sliver default
  filter_legit:
    dst_ip|cidr:
      - "1.1.1.0/24"
      - "8.8.8.0/24"
  condition: (selection_cs or selection_metasploit or selection_sliver) and not filter_legit
falsepositives:
  - Red team operations
  - Security research tools using the same TLS stack
level: high
